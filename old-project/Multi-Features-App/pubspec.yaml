name: multi_features_app
description: A modern, scalable Flutter mobile management application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.1

  # UI/UX
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  smooth_page_indicator: ^1.1.0

  # Utilities
  dio: ^5.4.0
  dio_cookie_manager: ^3.0.0
  cookie_jar: ^4.0.8
  path: ^1.8.3
  http: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  share_plus: ^7.2.1
  url_launcher: ^6.2.5
  flutter_localizations:
    sdk: flutter
  
  # WebView
  webview_flutter: ^4.4.2
  
  # Country & Phone
  country_picker: ^2.0.26
  
  # Calendar
  table_calendar: ^3.1.2
  
  # Charts
  fl_chart: ^0.66.0

  # Certificate & PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.1
  image: ^4.1.3
  vector_math: ^2.1.4

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/logo.png"
  android: true
  ios: true
  android_12:
    image: "assets/logo.png"
    color: "#ffffff"

