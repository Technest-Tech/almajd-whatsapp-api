version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: almajd-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - almajd

  nginx:
    image: nginx:1.25-alpine
    container_name: almajd-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - almajd

  postgres:
    image: postgres:15-alpine
    container_name: almajd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: almajd
      POSTGRES_USER: almajd
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - almajd

  redis:
    image: redis:7-alpine
    container_name: almajd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - almajd

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: almajd-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --queue=high,default,low --sleep=3 --tries=3
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - redis
    networks:
      - almajd

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: almajd-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - redis
    networks:
      - almajd

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: almajd-reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - redis
    networks:
      - almajd

networks:
  almajd:
    driver: bridge

volumes:
  postgres_data:
